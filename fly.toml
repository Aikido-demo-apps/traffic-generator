app = 'traffic-generator'
primary_region = 'ams'

[build]

[processes]
  worker = 'npm run start'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[metrics]
  port = 9090
  path = "/metrics"
